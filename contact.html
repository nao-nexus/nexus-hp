<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ｜株式会社Nexus innovation</title>

  <style>
    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #111;
      background: #fff;
      margin: 0;
      line-height: 1.8;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 20px;
    }

    h1 {
      font-size: 34px;
      text-align: center;
      margin-bottom: 40px;
    }

    label {
      display: block;
      margin-bottom: 6px;
    }

    .required {
      color: #c00;
      font-size: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 25px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #111;
      color: #fff;
      border: none;
      font-size: 15px;
    }

    .privacy-box {
      font-size: 13px;
      color: #444;
      margin-top: 40px;
    }

    .back {
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>

<body>
<div class="container">

<h1>お問い合わせ</h1>

<form action="https://formspree.io/f/mqewzykq" method="POST">

  <label>会社名 <span class="required">※必須</span></label>
  <input type="text" name="company" required>

  <label>ご担当者名 <span class="required">※必須</span></label>
  <input type="text" name="name" required>

  <label>メールアドレス <span class="required">※必須</span></label>
  <input type="email" name="email" required>

  <label>お問い合わせ内容</label>
  <textarea name="message"></textarea>

  <button type="submit">送信する</button>

</form>
<div class="privacy-box">
  <p>
    お問い合わせにより取得した個人情報は、対応の目的のみに使用し、
    法令を除き第三者へ提供することはありません。
  </p>
</div>

<div class="back">
  <a href="index.html">TOPへ戻る</a>
</div>

</div>
</body>
</html>
